name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (aarch64-apple-darwin)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: cargo build --release
        run: cargo build --release --locked --target aarch64-apple-darwin

      - name: package tarball
        id: pkg
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="hearth-${GITHUB_REF_NAME}-aarch64-apple-darwin"
          mkdir -p "dist/${STAGE}"
          cp "target/aarch64-apple-darwin/release/hearth" "dist/${STAGE}/"
          cp README.md LICENSE-MIT LICENSE-APACHE CHANGELOG.md "dist/${STAGE}/"
          (cd dist && tar -czf "${STAGE}.tar.gz" "${STAGE}")
          (cd dist && shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "stage=${STAGE}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.stage }}
          path: |
            dist/${{ steps.pkg.outputs.stage }}.tar.gz
            dist/${{ steps.pkg.outputs.stage }}.tar.gz.sha256

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: consolidate checksums
        run: |
          set -euo pipefail
          cd dist
          : > checksums.txt
          for f in *.sha256; do
            cat "$f" >> checksums.txt
          done
          ls -la

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
