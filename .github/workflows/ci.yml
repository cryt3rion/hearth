name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: debug toolchain layout
        run: |
          echo "PATH=$PATH"
          echo "--- which ---"
          which cargo || true
          which cargo-fmt || true
          which rustfmt || true
          which rustup || true
          echo "--- cargo bin ---"
          ls -la "$HOME/.cargo/bin/" || true
          echo "--- rustup toolchain bin ---"
          ls -la "$HOME/.rustup/toolchains/stable-aarch64-apple-darwin/bin/" || true
          echo "--- versions ---"
          rustup show
          rustup run stable cargo --version
          rustup run stable rustfmt --version

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: rustup run stable cargo fmt --all -- --check

      - name: cargo clippy
        run: rustup run stable cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo build
        run: rustup run stable cargo build --locked --verbose

      - name: cargo test
        run: rustup run stable cargo test --locked --verbose
